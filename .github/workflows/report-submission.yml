name: Report Submission

on:
  issues:
    types: [opened, edited, labeled]

concurrency:
  group: report-submission-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  report-submission:
    if: >-
      contains(github.event.issue.labels.*.name, 'report-submission') ||
      startsWith(github.event.issue.title, '[report]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Parse issue body and write report file
        id: parse
        continue-on-error: true
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -o pipefail
          node scripts/parse-report-issue.mjs 2>&1 | tee /tmp/report-parse.log

      - name: Build report index and validate reports
        id: validate
        if: steps.parse.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build:index 2>&1 | tee /tmp/report-build.log
          npm run validate:reports 2>&1 | tee /tmp/report-validate.log

      - name: Comment actionable errors and mark invalid submission
        if: steps.parse.outcome != 'success' || steps.validate.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');

            const parseFailed = '${{ steps.parse.outcome }}' !== 'success';
            const validateFailed = '${{ steps.validate.outcome }}' !== 'success' && '${{ steps.parse.outcome }}' === 'success';
            const parseError = `${{ steps.parse.outputs.error_message || '' }}`;

            let details = '';
            let failureType = 'Validation failed';
            if (parseFailed && fs.existsSync('/tmp/report-parse.log')) {
              details = fs.readFileSync('/tmp/report-parse.log', 'utf8');
              if (parseError.includes('not valid JSON')) {
                failureType = 'Invalid JSON payload';
              } else if (parseError.includes('Invalid slug')) {
                failureType = 'Invalid slug';
              } else {
                failureType = 'Submission parsing failed';
              }
            } else if (validateFailed) {
              failureType = 'Report validator failed (`npm run validate:reports`)';
              if (fs.existsSync('/tmp/report-validate.log')) {
                const validateLog = fs.readFileSync('/tmp/report-validate.log', 'utf8').trim();
                const lines = validateLog.split('\n');
                details = lines.slice(Math.max(lines.length - 120, 0)).join('\n');
              }
            }

            if (details.length > 55000) {
              details = `${details.slice(0, 55000)}\n\n...truncated...`;
            }

            const body = [
              '⚠️ Report submission validation failed',
              '',
              `**Failure type:** ${failureType}`,
              '',
              'Please fix the issue payload and re-submit:',
              '- Ensure the slug is lowercase/kebab-case (`[a-z0-9-]`).',
              '- Ensure the JSON payload is valid JSON and matches the report schema.',
              '- Include all required fields expected by `npm run validate:reports`.',
              '',
              '```text',
              details || 'No logs were captured. Please check the workflow logs.',
              '```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['submission-invalid'],
            });

      - name: Stop workflow after invalid submission
        if: steps.parse.outcome != 'success' || steps.validate.outcome != 'success'
        run: exit 1

      - name: Create pull request for valid report submission
        id: create-pr
        if: steps.parse.outcome == 'success' && steps.validate.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: report-submissions/${{ github.event.issue.number }}-${{ steps.parse.outputs.slug }}
          commit-message: 'chore(reports): add report submission ${{ steps.parse.outputs.slug }}'
          title: 'Add report: ${{ steps.parse.outputs.slug }}'
          body: |
            Originating issue: #${{ github.event.issue.number }} (${{ steps.parse.outputs.issue_url }}).

            Content in this PR came from the Issue submission workflow.

            This PR was created automatically after parsing, indexing, and validating the submitted payload.
            ${{ steps.parse.outputs.normalization_notes != '' && format('\nNormalization notes:\n{0}\n', steps.parse.outputs.normalization_notes) || '' }}
            ${{ steps.parse.outputs.generated_summary != '' && format('\nGenerated summary:\n> {0}\n', steps.parse.outputs.generated_summary) || '' }}
          add-paths: |
            reports/${{ steps.parse.outputs.report_file }}
            reports/index.json

      - name: Comment with validation success and pull request link
        if: steps.create-pr.outputs.pull-request-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = '${{ steps.create-pr.outputs.pull-request-url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '✅ Report submission validation passed.',
                '',
                `- Pull request: ${prUrl}`,
                '- Next step: a maintainer will review and merge if everything looks good.',
              ].join('\n'),
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['submission-valid', 'submission-pr-opened'],
            });
