<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top Task Dashboard</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-reports-base=".">
    <header class="site-header">
      <div class="brand">
        <h1>Top Task Dashboard</h1>
        <p>Explore top-task analysis reports stored as JSON files.</p>
      </div>
      <nav class="site-nav" aria-label="Main">
        <a class="active" href="./">Report Explorer</a>
        <a href="../index.html">All Reports Overview</a>
        <a href="../prompt.html">Prompt Builder</a>
      </nav>
    </header>

    <main class="layout">
      <aside class="panel">
        <h2>Reports</h2>
        <input id="report-search" type="search" placeholder="Search reports" />
        <ul id="report-list"></ul>
      </aside>

      <section class="panel content">
        <div class="toolbar">
          <button id="download-md" type="button">Download Markdown</button>
        </div>

        <article id="report-view" aria-live="polite">
          <p>Select a report to begin.</p>
        </article>
      </section>
    </main>

    <footer>
      <small>Static build for ASPA Digital.</small>
    </footer>

    <script type="module" src="../app.js"></script>
  </body>
</html>
